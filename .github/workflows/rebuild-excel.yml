name: Rebuild Excel

on:
  push:
    branches: [main]
    paths:
      - classifications_web.json

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild Excel
        run: python rebuild_excel.py

      - name: Commit updated Excel
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NF_Guidelines_Curated.xlsx
          git diff --staged --quiet || git commit -m "Rebuild Excel from updated classifications [skip ci]"
          git push
